# glyphs.yaml - Glyph/Script pattern mappings
# Maps letter/shape patterns to concept targets.
# All glyph knowledge lives here, not in Go code.

# Latin glyph patterns
latin:
  # Bigram patterns - maps common bigrams to targets
  bigrams:
    - pattern: "in"
      concept: inward
      confidence: plausible
      weight: 0.4
      
    - pattern: "un"
      concept: inward
      confidence: plausible
      weight: 0.4
      
    - pattern: "en"
      concept: inward
      confidence: plausible
      weight: 0.4
      
    - pattern: "on"
      concept: inward
      confidence: plausible
      weight: 0.4
      
    - pattern: "er"
      concept: being
      confidence: speculative
      weight: 0.3
      
    - pattern: "or"
      concept: being
      confidence: speculative
      weight: 0.3
      
    - pattern: "ar"
      concept: being
      confidence: speculative
      weight: 0.3

  # Prefix patterns
  prefixes:
    - pattern: "ins"
      concept: inward
      confidence: verified
      weight: 0.5
      
    - pattern: "inh"
      concept: inward
      confidence: verified
      weight: 0.5
      
    - pattern: "inb"
      concept: inward
      confidence: verified
      weight: 0.5

  # Suffix patterns
  suffixes:
    - pattern: "ly"
      concept: action
      confidence: speculative
      weight: 0.3
      
    - pattern: "ty"
      concept: action
      confidence: speculative
      weight: 0.3
      
    - pattern: "ry"
      concept: action
      confidence: speculative
      weight: 0.3
      
    - pattern: "gy"
      concept: action
      confidence: speculative
      weight: 0.3

  # Vowel structure targets
  vowel_structure:
    heavy:
      concept: breath
      confidence: speculative
      weight: 0.2
    light:
      concept: ground
      confidence: speculative
      weight: 0.2

